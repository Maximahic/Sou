<body class="bg-surface-500 text-gray-100 min-h-screen font-sans antialiased relative">
    <div class="glow-circle glow-circle-1"></div>
    <div class="glow-circle glow-circle-2"></div>

    <div id="app" class="min-h-screen flex flex-col relative z-10">
        <div id="loading-screen" class="flex items-center justify-center min-h-screen">
            <div class="text-center fade-in">
                <div class="relative inline-block mb-6">
                    <i class="fas fa-water text-7xl pulse-glow" style="color: var(--accent);"></i>
                    <div class="absolute inset-0 bg-gradient-to-r from-purple-500 to-blue-500 rounded-full filter blur-xl opacity-20 animate-pulse"></div>
                </div>
                <h1 class="text-4xl font-black gradient-text mb-3">Subtle Currents</h1>
                <p class="text-gray-400 text-lg">Загрузка платформы...</p>
                <div class="mt-6 flex justify-center">
                    <div class="w-8 h-8 border-2 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // ============================================
        // КОНСТАНТЫ
        // ============================================
        const STORAGE_PREFIX = 'sc_';
        const ADMIN_EMAIL = 'admin@subtle.com';
        const ADMIN_PASSWORD = 'admin123';
        const ADMIN_NAME = 'Главный Администратор';

        // ============================================
        // СЕРВИС ОЧИСТКИ КЭША
        // ============================================
        class CacheService {
            constructor(prefix) {
                this.prefix = prefix;
            }

            // Полная очистка всех данных
            clearAllData() {
                const keysToRemove = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key.startsWith(this.prefix)) {
                        keysToRemove.push(key);
                    }
                }
                keysToRemove.forEach(key => localStorage.removeItem(key));
                return keysToRemove.length;
            }

            // Очистка только релизов и тикетов (без пользователей)
            clearContentData() {
                const keysToRemove = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key.startsWith(this.prefix) && 
                        (key.includes('releases') || key.includes('tickets') || key.includes('ticket_messages'))) {
                        keysToRemove.push(key);
                    }
                }
                keysToRemove.forEach(key => localStorage.removeItem(key));
                return keysToRemove.length;
            }

            // Очистка сессии (выход всех пользователей)
            clearSessionData() {
                const sessionKeys = ['current_user', 'auth_token'];
                sessionKeys.forEach(key => {
                    localStorage.removeItem(this.prefix + key);
                });
            }

            // Получение статистики хранилища
            getStorageStats() {
                let totalKeys = 0;
                let totalSize = 0;
                const data = {};

                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key.startsWith(this.prefix)) {
                        totalKeys++;
                        const value = localStorage.getItem(key);
                        totalSize += new Blob([value]).size;
                        
                        const shortKey = key.replace(this.prefix, '');
                        try {
                            const parsed = JSON.parse(value);
                            data[shortKey] = Array.isArray(parsed) ? parsed.length : 'object';
                        } catch {
                            data[shortKey] = 'raw';
                        }
                    }
                }

                return {
                    totalKeys,
                    totalSize: this.formatBytes(totalSize),
                    details: data
                };
            }

            formatBytes(bytes) {
                if (bytes === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }
        }

        // ============================================
        // БАЗА ДАННЫХ (LocalStorage)
        // ============================================
        class Database {
            constructor() {
                this.prefix = STORAGE_PREFIX;
                this.cacheService = new CacheService(this.prefix);
            }
            
            init() {
                if (!this.get('users')) this.set('users', []);
                if (!this.get('releases')) this.set('releases', []);
                if (!this.get('tickets')) this.set('tickets', []);
                if (!this.get('ticket_messages')) this.set('ticket_messages', []);
                if (!this.get('current_user')) this.set('current_user', null);
                if (!this.get('auth_token')) this.set('auth_token', null);
                
                this.createHiddenAdmin();
            }
            
            get(key) {
                const data = localStorage.getItem(this.prefix + key);
                return data ? JSON.parse(data) : null;
            }
            
            set(key, value) {
                localStorage.setItem(this.prefix + key, JSON.stringify(value));
            }
            
            generateId() {
                return 'sc_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            }
            
            createHiddenAdmin() {
                const users = this.get('users');
                
                const adminExists = users.find(u => u.email === ADMIN_EMAIL);
                if (adminExists) return;
                
                const adminUser = {
                    id: this.generateId(),
                    email: ADMIN_EMAIL,
                    password: this.hashPassword(ADMIN_PASSWORD),
                    fullName: ADMIN_NAME,
                    role: 'admin',
                    createdAt: new Date().toISOString(),
                    isHidden: true
                };
                
                users.push(adminUser);
                this.set('users', users);
            }
            
            hashPassword(password) {
                const salt = '_sc_salt_2024_';
                let hash = password + salt;
                for (let i = 0; i < 5; i++) {
                    hash = btoa(hash);
                }
                return hash;
            }
            
            verifyPassword(password, hash) {
                const hashedInput = this.hashPassword(password);
                return hashedInput === hash;
            }
            
            query(collection, filter = null) {
                const items = this.get(collection);
                if (!filter) return items;
                
                return items.filter(item => {
                    for (const key in filter) {
                        if (item[key] !== filter[key]) return false;
                    }
                    return true;
                });
            }
            
            insert(collection, item) {
                const items = this.get(collection);
                items.push(item);
                this.set(collection, items);
                return item;
            }
            
            update(collection, id, updates) {
                const items = this.get(collection);
                const index = items.findIndex(item => item.id === id);
                if (index !== -1) {
                    items[index] = { ...items[index], ...updates, updatedAt: new Date().toISOString() };
                    this.set(collection, items);
                    return items[index];
                }
                return null;
            }

            delete(collection, id) {
                const items = this.get(collection);
                const filtered = items.filter(item => item.id !== id);
                this.set(collection, filtered);
                return true;
            }

            // Методы для очистки кэша
            clearAllData() {
                this.cacheService.clearSessionData();
                return this.cacheService.clearAllData();
            }

            clearContentData() {
                return this.cacheService.clearContentData();
            }

            clearSessionData() {
                return this.cacheService.clearSessionData();
            }

            getStorageStats() {
                return this.cacheService.getStorageStats();
            }
        }
        
        // ============================================
        // СЕРВИС АВТОРИЗАЦИИ
        // ============================================
        class AuthService {
            constructor(db) {
                this.db = db;
                this.currentUser = this.db.get('current_user');
                this.token = this.db.get('auth_token');
            }
            
            isAuthenticated() {
                return this.currentUser && this.token;
            }
            
            isAdmin() {
                return this.currentUser?.role === 'admin';
            }
            
            async login(email, password) {
                const users = this.db.get('users');
                const user = users.find(u => u.email === email);
                
                if (!user) {
                    throw new Error('Неверный email или пароль');
                }
                
                const passwordValid = this.db.verifyPassword(password, user.password);
                
                if (!passwordValid) {
                    throw new Error('Неверный email или пароль');
                }
                
                const token = 'sc_token_' + Date.now() + '_' + Math.random().toString(36);
                this.currentUser = {
                    id: user.id,
                    email: user.email,
                    fullName: user.fullName,
                    role: user.role,
                    createdAt: user.createdAt
                };
                this.token = token;
                
                this.db.set('current_user', this.currentUser);
                this.db.set('auth_token', token);
                
                return { user: this.currentUser, token };
            }
            
            async register(email, password, fullName) {
                const users = this.db.get('users');
                
                if (users.find(u => u.email === email)) {
                    throw new Error('Пользователь с таким email уже существует');
                }
                
                if (password.length < 6) {
                    throw new Error('Пароль должен содержать минимум 6 символов');
                }
                
                const user = {
                    id: this.db.generateId(),
                    email,
                    password: this.db.hashPassword(password),
                    fullName,
                    role: 'user',
                    createdAt: new Date().toISOString()
                };
                
                this.db.insert('users', user);
                return this.login(email, password);
            }
            
            async promoteToAdmin(userId) {
                if (!this.isAdmin()) throw new Error('Только администратор может повышать права');
                return this.db.update('users', userId, { role: 'admin' });
            }

            async demoteToUser(userId) {
                if (!this.isAdmin()) throw new Error('Только администратор может понижать права');
                return this.db.update('users', userId, { role: 'user' });
            }

            async deleteUser(userId) {
                if (!this.isAdmin()) throw new Error('Только администратор может удалять пользователей');
                const user = this.db.query('users', null).find(u => u.id === userId);
                if (user && user.isHidden) throw new Error('Нельзя удалить системного администратора');
                return this.db.delete('users', userId);
            }
            
            async logout() {
                this.currentUser = null;
                this.token = null;
                this.db.set('current_user', null);
                this.db.set('auth_token', null);
            }
        }
        
        // ============================================
        // СЕРВИС РЕЛИЗОВ
        // ============================================
        class ReleaseService {
            constructor(db, auth) {
                this.db = db;
                this.auth = auth;
            }
            
            createRelease(data) {
                const release = {
                    id: this.db.generateId(),
                    userId: this.auth.currentUser.id,
                    title: data.title,
                    artist: data.artist,
                    genre: data.genre,
                    releaseDate: data.releaseDate,
                    coverArt: data.coverArt || null,
                    audioFile: data.audioFile || null,
                    platforms: data.platforms || [],
                    pitching: data.pitching || false,
                    pitchingDescription: data.pitchingDescription || '',
                    status: 'pending',
                    isrcCode: '',
                    upcCode: '',
                    rejectionReason: '',
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };
                
                return this.db.insert('releases', release);
            }
            
            getUserReleases() {
                return this.db.query('releases', { userId: this.auth.currentUser.id })
                    .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            }
            
            getAllReleases() {
                const releases = this.db.get('releases');
                const users = this.db.get('users');
                
                return releases.map(release => {
                    const user = users.find(u => u.id === release.userId);
                    return {
                        ...release,
                        userEmail: user?.email || 'Неизвестный',
                        userFullName: user?.fullName || 'Неизвестный'
                    };
                }).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            }
            
            updateStatus(releaseId, status, isrcCode = '', upcCode = '', rejectionReason = '') {
                const updates = { status, updatedAt: new Date().toISOString() };
                if (isrcCode) updates.isrcCode = isrcCode;
                if (upcCode) updates.upcCode = upcCode;
                if (rejectionReason) updates.rejectionReason = rejectionReason;
                return this.db.update('releases', releaseId, updates);
            }
            
            deleteRelease(releaseId) {
                return this.db.delete('releases', releaseId);
            }

            getStats() {
                const releases = this.getUserReleases();
                return {
                    total: releases.length,
                    pending: releases.filter(r => r.status === 'pending').length,
                    approved: releases.filter(r => r.status === 'approved').length,
                    published: releases.filter(r => r.status === 'published').length,
                    rejected: releases.filter(r => r.status === 'rejected').length
                };
            }
            
            getAdminStats() {
                const releases = this.db.get('releases');
                const users = this.db.get('users');
                return {
                    total: releases.length,
                    pending: releases.filter(r => r.status === 'pending').length,
                    approved: releases.filter(r => r.status === 'approved').length,
                    published: releases.filter(r => r.status === 'published').length,
                    rejected: releases.filter(r => r.status === 'rejected').length,
                    totalUsers: users.length,
                    adminUsers: users.filter(u => u.role === 'admin').length,
                    regularUsers: users.filter(u => u.role === 'user').length
                };
            }
        }
        
        // ============================================
        // СЕРВИС ПОДДЕРЖКИ
        // ============================================
        class SupportService {
            constructor(db, auth) {
                this.db = db;
                this.auth = auth;
            }
            
            createTicket(subject, message) {
                const ticket = {
                    id: this.db.generateId(),
                    userId: this.auth.currentUser.id,
                    subject,
                    status: 'open',
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };
                
                this.db.insert('tickets', ticket);
                
                const msg = {
                    id: this.db.generateId(),
                    ticketId: ticket.id,
                    senderId: this.auth.currentUser.id,
                    message,
                    createdAt: new Date().toISOString()
                };
                
                this.db.insert('ticket_messages', msg);
                return ticket;
            }
            
            getUserTickets() {
                const tickets = this.db.query('tickets', { userId: this.auth.currentUser.id });
                return tickets.map(ticket => ({
                    ...ticket,
                    messageCount: this.db.query('ticket_messages', { ticketId: ticket.id }).length
                })).sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
            }
            
            getAllTickets() {
                const tickets = this.db.get('tickets');
                const users = this.db.get('users');
                
                return tickets.map(ticket => {
                    const user = users.find(u => u.id === ticket.userId);
                    return {
                        ...ticket,
                        userEmail: user?.email || 'Неизвестный',
                        userFullName: user?.fullName || 'Неизвестный'
                    };
                }).sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
            }
            
            getMessages(ticketId) {
                const messages = this.db.query('ticket_messages', { ticketId });
                const users = this.db.get('users');
                
                return messages.map(msg => {
                    const user = users.find(u => u.id === msg.senderId);
                    return {
                        ...msg,
                        senderName: user?.fullName || 'Неизвестный',
                        senderRole: user?.role || 'user'
                    };
                }).sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
            }
            
            sendMessage(ticketId, message) {
                const msg = {
                    id: this.db.generateId(),
                    ticketId,
                    senderId: this.auth.currentUser.id,
                    message,
                    createdAt: new Date().toISOString()
                };
                
                this.db.insert('ticket_messages', msg);
                
                const ticket = this.db.query('tickets', null).find(t => t.id === ticketId);
                if (ticket && ticket.status === 'closed') {
                    this.db.update('tickets', ticketId, { status: 'in_progress' });
                }
                
                return msg;
            }

            updateTicketStatus(ticketId, status) {
                return this.db.update('tickets', ticketId, { status, updatedAt: new Date().toISOString() });
            }
        }
        
        // ============================================
        // ИНИЦИАЛИЗАЦИЯ СЕРВИСОВ
        // ============================================
        const db = new Database();
        db.init();
        
        const authService = new AuthService(db);
        const releaseService = new ReleaseService(db, authService);
        const supportService = new SupportService(db, authService);
        
        // ============================================
        // УТИЛИТЫ
        // ============================================
        const Utils = {
            formatDate(dateString) {
                return new Date(dateString).toLocaleDateString('ru-RU', {
                    day: 'numeric', month: 'long', year: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                });
            },
            
            formatFileSize(bytes) {
                if (!bytes) return '0 B';
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / 1048576).toFixed(1) + ' MB';
            },
            
            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            },
            
            getStatusBadge(status) {
                const badges = {
                    'pending': 'bg-yellow-500/10 text-yellow-400 border border-yellow-500/20',
                    'approved': 'bg-green-500/10 text-green-400 border border-green-500/20',
                    'published': 'bg-blue-500/10 text-blue-400 border border-blue-500/20',
                    'rejected': 'bg-red-500/10 text-red-400 border border-red-500/20',
                };
                
                const labels = {
                    'pending': 'На модерации',
                    'approved': 'Принято',
                    'published': 'Опубликовано',
                    'rejected': 'Отклонено',
                };
                
                return `<span class="status-badge ${badges[status] || badges.pending}">${labels[status] || status}</span>`;
            },
            
            showNotification(message, type = 'success') {
                const colors = {
                    success: 'bg-gradient-to-r from-green-600 to-emerald-600 border-green-400',
                    error: 'bg-gradient-to-r from-red-600 to-rose-600 border-red-400',
                    info: 'bg-gradient-to-r from-blue-600 to-cyan-600 border-blue-400',
                    warning: 'bg-gradient-to-r from-yellow-600 to-amber-600 border-yellow-400'
                };
                
                const icons = {
                    success: 'fa-check-circle',
                    error: 'fa-exclamation-circle',
                    info: 'fa-info-circle',
                    warning: 'fa-exclamation-triangle'
                };
                
                const notification = document.createElement('div');
                notification.className = `fixed top-4 right-4 ${colors[type]} text-white px-6 py-3 rounded-xl shadow-2xl border z-50 slide-in flex items-center gap-3`;
                notification.innerHTML = `
                    <i class="fas ${icons[type]} text-xl"></i>
                    <span>${message}</span>
                `;
                
                document.body.appendChild(notification);
                
                setTimeout(() => {
                    notification.style.opacity = '0';
                    notification.style.transition = 'opacity 0.3s';
                    setTimeout(() => notification.remove(), 300);
                }, 4000);
            },
            
            async fileToBase64(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            },

            musicPlatforms: [
                { id: 'spotify', name: 'Spotify', icon: 'fa-spotify' },
                { id: 'apple_music', name: 'Apple Music', icon: 'fa-apple' },
                { id: 'yandex_music', name: 'Яндекс Музыка', icon: 'fa-yandex' },
                { id: 'vk_music', name: 'VK Музыка', icon: 'fa-vk' },
                { id: 'youtube_music', name: 'YouTube Music', icon: 'fa-youtube' },
                { id: 'deezer', name: 'Deezer', icon: 'fa-deezer' },
                { id: 'tidal', name: 'Tidal', icon: 'fa-tidal' },
                { id: 'amazon_music', name: 'Amazon Music', icon: 'fa-amazon' },
                { id: 'soundcloud', name: 'SoundCloud', icon: 'fa-soundcloud' },
                { id: 'boom', name: 'Boom', icon: 'fa-headphones' },
                { id: 'zvooq', name: 'Звук (СберЗвук)', icon: 'fa-music' },
                { id: 'tencent', name: 'Tencent Music', icon: 'fa-music' },
            ],

            confirmDialog(message, isDanger = false) {
                return new Promise((resolve) => {
                    const overlay = document.createElement('div');
                    overlay.className = 'fixed inset-0 modal-backdrop flex items-center justify-center z-[60] p-4';
                    overlay.innerHTML = `
                        <div class="bg-surface-300 rounded-2xl w-full max-w-md shadow-2xl border ${isDanger ? 'border-red-500/50' : 'border-gray-700'} p-6">
                            <div class="text-center mb-6">
                                <i class="fas ${isDanger ? 'fa-skull text-red-400' : 'fa-exclamation-triangle text-yellow-400'} text-4xl mb-3"></i>
                                <h3 class="text-lg font-bold mb-2">${isDanger ? '⚠️ ОПАСНОЕ ДЕЙСТВИЕ' : 'Подтверждение'}</h3>
                                <p class="text-gray-400">${message}</p>
                                ${isDanger ? '<p class="text-red-400 text-sm mt-2">Это действие нельзя отменить!</p>' : ''}
                            </div>
                            <div class="flex gap-3 justify-center">
                                <button class="confirm-yes-btn ${isDanger ? 'btn-danger-lg' : 'btn-danger'} px-6 py-2.5 rounded-xl text-sm font-semibold">
                                    ${isDanger ? 'Да, я понимаю последствия' : 'Да, удалить'}
                                </button>
                                <button class="confirm-no-btn btn-secondary px-6 py-2.5 rounded-xl text-sm font-semibold">
                                    Отмена
                                </button>
                            </div>
                        </div>
                    `;
                    document.body.appendChild(overlay);

                    overlay.querySelector('.confirm-yes-btn').addEventListener('click', () => {
                        overlay.remove();
                        resolve(true);
                    });

                    overlay.querySelector('.confirm-no-btn').addEventListener('click', () => {
                        overlay.remove();
                        resolve(false);
                    });

                    overlay.addEventListener('click', (e) => {
                        if (e.target === overlay) {
                            overlay.remove();
                            resolve(false);
                        }
                    });
                });
            }
        };
        
        // ============================================
        // UI КОМПОНЕНТЫ
        // ============================================
        class UIComponents {
            static createNavbar(user) {
                return `
                    <nav class="glass-nav sticky top-0 z-40 px-4 sm:px-6 py-3 sm:py-4">
                        <div class="max-w-7xl mx-auto flex items-center justify-between gap-3">
                            <div class="flex items-center gap-3 min-w-0">
                                <div class="relative">
                                    <i class="fas fa-water text-2xl gradient-text"></i>

            static createReleasesTable(releases, isAdmin = false) {

                }
                
                return `
                    <div class="card overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead>
                                    <tr class="border-b border-gray-700">
                                        <th class="text-left p-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Трек</th>
                                        ${isAdmin ? '<th class="text-left p-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Пользователь</th>' : ''}

                                        <th class="text-left p-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Платформы</th>
                                        <th class="text-left p-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Дата</th>
                                        <th class="text-left p-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Статус</th>

                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-700/50">
                                    ${releases.map(release => `
                                        <tr class="transition-colors">
                                            <td class="p-4">
                                                <div class="flex items-center gap-3">
                                                    ${release.coverArt ? 
                                                        `<img src="${release.coverArt}" class="w-10 h-10 rounded-lg object-cover ring-2 ring-gray-700">` :
                                                        `<div class="w-10 h-10 bg-gray-800 rounded-lg flex items-center justify-center ring-2 ring-gray-700">
                                                            <i class="fas fa-music text-gray-500"></i>
                                                        </div>`
                                                    }
                                                    <div>
                                                        <span class="font-semibold text-sm">${Utils.escapeHtml(release.title)}</span>
                                                        ${release.pitching ? '<span class="text-xs text-purple-400 block">🎯 Питчинг</span>' : ''}
                                                    </div>
                                                </div>
                                            </td>
                                            ${isAdmin ? `<td class="p-4 text-sm text-gray-400">${Utils.escapeHtml(release.userEmail || 'Неизвестный')}</td>` : ''}
                                            <td class="p-4 text-sm text-gray-300 font-medium">${Utils.escapeHtml(release.artist)}</td>
                                            <td class="p-4">
                                                <div class="flex flex-wrap gap-1">
                                                    ${release.platforms && release.platforms.length > 0 ? 
                                                        release.platforms.slice(0, 3).map(p => {
                                                            const platform = Utils.musicPlatforms.find(pl => pl.id === p);
                                                            return `<span class="text-xs bg-white/5 px-2 py-0.5 rounded-full">${platform ? platform.name : p}</span>`;
                                                        }).join('') + 
                                                        (release.platforms.length > 3 ? `<span class="text-xs text-gray-500">+${release.platforms.length - 3}</span>` : '')
                                                        : '<span class="text-xs text-gray-500">Не выбраны</span>'
                                                    }
                                                </div>
                                            </td>
                                            <td class="p-4 text-sm text-gray-400">${Utils.formatDate(release.createdAt)}</td>
                                            <td class="p-4">${Utils.getStatusBadge(release.status)}</td>
                                            ${isAdmin ? `
                                                <td class="p-4">
                                                    <div class="space-y-2">
                                                        <input type="text" class="input-dark text-xs px-3 py-1.5 rounded-lg w-full" placeholder="ISRC код" value="${release.isrcCode || ''}" data-release-id="${release.id}" data-field="isrcCode">
                                                        <input type="text" class="input-dark text-xs px-3 py-1.5 rounded-lg w-full" placeholder="UPC код" value="${release.upcCode || ''}" data-release-id="${release.id}" data-field="upcCode">
                                                    </div>
                                                </td>
                                            ` : ''}
                                            <td class="p-4">
                                                <div class="flex gap-2">
                                                    ${isAdmin ? `
                                                        <select class="input-dark text-xs px-3 py-1.5 rounded-lg status-select" data-release-id="${release.id}">
                                                            <option value="pending" ${release.status === 'pending' ? 'selected' : ''}>На модерации</option>
                                                            <option value="approved" ${release.status === 'approved' ? 'selected' : ''}>Принято</option>
                                                            <option value="rejected" ${release.status === 'rejected' ? 'selected' : ''}>Отклонено</option>
                                                            <option value="published" ${release.status === 'published' ? 'selected' : ''}>Опубликовано</option>
                                                        </select>
                                                        <div class="rejection-reason-input" data-release-id="${release.id}" style="display: ${release.status === 'rejected' ? 'block' : 'none'};">
                                                            <input type="text" class="input-dark text-xs px-3 py-1.5 rounded-lg w-full mt-1" placeholder="Причина отклонения" value="${release.rejectionReason || ''}">
                                                        </div>
                                                        <button class="save-status-btn btn-primary text-xs px-3 py-1.5 rounded-lg" data-release-id="${release.id}">
                                                            <i class="fas fa-save"></i>
                                                        </button>
                                                        <button class="delete-release-btn btn-danger text-xs px-3 py-1.5 rounded-lg" data-release-id="${release.id}">
                                                            <i class="fas fa-trash"></i>
                                                        </button>
                                                    ` : ''}
                                                    <button class="view-details-btn btn-secondary text-xs px-3 py-1.5 rounded-lg" data-release-id="${release.id}">
                                                        <i class="fas fa-info-circle"></i>
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }

        // ============================================
        // РОУТЕР SPA
        // ============================================
        class Router {
            constructor() {
                this.currentPage = 'dashboard';
            }
            
            navigate(page) {
                this.currentPage = page;
                this.renderPage(page);
                this.updateNavButtons(page);
            }
            
            updateNavButtons(activePage) {
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    const page = btn.dataset.page;
                    if (page === activePage) {
                        btn.classList.add('bg-white/10', 'text-white');
                        btn.classList.remove('hover:bg-white/5');
                    } else {
                        btn.classList.remove('bg-white/10', 'text-white');
                        btn.classList.add('hover:bg-white/5');
                    }
                });
            }
            
            renderPage(page) {
                const content = document.getElementById('page-content');
                
                switch(page) {
                    case 'dashboard':
                        content.innerHTML = this.getDashboardPage();
                        break;
                    case 'releases':
                        content.innerHTML = this.getReleasesPage();
                        this.initReleases();
                        break;
                    case 'admin':
                        if (authService.isAdmin()) {
                            content.innerHTML = this.getAdminPage();
                            this.initAdmin();
                        }
                        break;
                    case 'support':
                        content.innerHTML = this.getSupportPage();
                        this.initSupport();
                        break;
                }
            }
            
            getDashboardPage() {
                const stats = authService.isAdmin() ? releaseService.getAdminStats() : releaseService.getStats();
                
                return `
                    <div class="space-y-6 fade-in">
                        <div class="flex items-center justify-between">
                            <div>
                                <h1 class="text-3xl font-black">Дашборд</h1>
                                <p class="text-gray-400 mt-1">Добро пожаловать, ${Utils.escapeHtml(authService.currentUser.fullName)}</p>
                            </div>
                            <div class="hidden md:block">
                                <i class="fas fa-chart-line text-4xl text-purple-500/20"></i>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            ${this.createStatCard('Всего релизов', stats.total, 'music', 'from-purple-500 to-pink-500')}
                            ${this.createStatCard('На модерации', stats.pending, 'clock', 'from-yellow-500 to-orange-500')}
                            ${this.createStatCard('Принято', stats.approved + stats.published, 'check-circle', 'from-green-500 to-emerald-500')}
                            ${this.createStatCard('Отклонено', stats.rejected, 'times-circle', 'from-red-500 to-rose-500')}
                        </div>
                        
                        ${authService.isAdmin() ? `
                            <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                                ${this.createStatCard('Пользователей', stats.totalUsers, 'users', 'from-cyan-500 to-blue-500')}
                                ${this.createStatCard('Админов', stats.adminUsers, 'crown', 'from-purple-500 to-violet-500')}
                                ${this.createStatCard('Артистов', stats.regularUsers, 'user', 'from-teal-500 to-green-500')}
                            </div>
                        ` : ''}
                        
                        <div class="card p-6">
                            <h2 class="text-lg font-bold mb-4">Быстрые действия</h2>
                            <div class="flex flex-wrap gap-3">
                                <button onclick="router.navigate('releases')" class="btn-primary px-6 py-3 rounded-xl text-sm font-semibold">
                                    <i class="fas fa-upload mr-2"></i>Загрузить релиз
                                </button>
                                <button onclick="router.navigate('support')" class="btn-secondary px-6 py-3 rounded-xl text-sm font-semibold">
                                    <i class="fas fa-headset mr-2"></i>Поддержка
                                </button>
                            </div>
                        </div>
                        
                        <div class="card p-6">
                            <h2 class="text-lg font-bold mb-4">Последние релизы</h2>
                            ${UIComponents.createReleasesTable(releaseService.getUserReleases().slice(0, 5))}
                        </div>
                    </div>
                `;
            }
            
            createStatCard(title, value, icon, gradient) {
                return `
                    <div class="card p-6 hover:scale-105 transition-transform">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-gradient-to-br ${gradient} rounded-xl flex items-center justify-center shadow-lg">
                                <i class="fas fa-${icon} text-white text-xl"></i>
                            </div>
                            <div>
                                <p class="text-sm text-gray-400 font-medium">${title}</p>
                                <p class="text-3xl font-black">${value}</p>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            getReleasesPage() {
                return `
                    <div class="space-y-6 fade-in">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div>
                                <h1 class="text-3xl font-black">Мои релизы</h1>
                                <p class="text-gray-400 mt-1">Управляйте вашими треками</p>
                            </div>
                            <button id="show-release-form-btn" class="btn-primary px-6 py-3 rounded-xl text-sm font-semibold">
                                <i class="fas fa-plus mr-2"></i>Добавить релиз
                            </button>
                        </div>
                        
                        <div id="release-form-container">
                            ${UIComponents.createReleaseForm()}
                        </div>
                        
                        <div id="releases-table-container">
                            ${UIComponents.createReleasesTable(releaseService.getUserReleases())}
                        </div>
                    </div>
                `;
            }
            
            getAdminPage() {
                const storageStats = db.getStorageStats();

            initReleases() {
                const formContainer = document.getElementById('release-form-container');
                const showFormBtn = document.getElementById('show-release-form-btn');
                
                formContainer.style.display = 'none';
                
                showFormBtn.addEventListener('click', () => {
                    const isVisible = formContainer.style.display !== 'none';
                    formContainer.style.display = isVisible ? 'none' : 'block';
                    showFormBtn.innerHTML = isVisible ? 
                        '<i class="fas fa-plus mr-2"></i>Добавить релиз' :
                        '<i class="fas fa-times mr-2"></i>Отмена';
                    if (!isVisible) {
                        formContainer.scrollIntoView({ behavior: 'smooth' });
                        setTimeout(() => {
                            this.initPitchingToggle();
                            this.initPlatformSelection();
                        }, 100);
                    }
                });
                
                this.initReleaseForm();
                this.initReleaseDetails();
            }
            
            initPitchingToggle() {
                const pitchingCheckbox = document.getElementById('pitching-checkbox');
                const pitchingContainer = document.getElementById('pitching-description-container');
                
                if (pitchingCheckbox && pitchingContainer) {
                    pitchingCheckbox.addEventListener('change', () => {
                        pitchingContainer.classList.toggle('hidden', !pitchingCheckbox.checked);
                    });
                }
            }

            initPlatformSelection() {
                const platformItems = document.querySelectorAll('.platform-item');
                
                platformItems.forEach(item => {
                    item.addEventListener('click', () => {
                        const checkbox = item.querySelector('.platform-checkbox');
                        const checkIcon = item.querySelector('.platform-check-icon');
                        const platformIcon = item.querySelector('.platform-icon');
                        
                        checkbox.checked = !checkbox.checked;
                        
                        if (checkbox.checked) {
                            item.classList.add('selected');
                            checkIcon.classList.remove('hidden');
                            platformIcon.classList.add('text-purple-400');
                        } else {
                            item.classList.remove('selected');
                            checkIcon.classList.add('hidden');
                            platformIcon.classList.remove('text-purple-400');
                        }
                    });
                });

                const selectAllBtn = document.getElementById('select-all-platforms');
                const deselectAllBtn = document.getElementById('deselect-all-platforms');

                if (selectAllBtn) {
                    selectAllBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        platformItems.forEach(item => {
                            const checkbox = item.querySelector('.platform-checkbox');
                            const checkIcon = item.querySelector('.platform-check-icon');
                            const platformIcon = item.querySelector('.platform-icon');
                            
                            checkbox.checked = true;
                            item.classList.add('selected');
                            checkIcon.classList.remove('hidden');
                            platformIcon.classList.add('text-purple-400');
                        });
                    });
                }

                if (deselectAllBtn) {
                    deselectAllBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        platformItems.forEach(item => {
                            const checkbox = item.querySelector('.platform-checkbox');
                            const checkIcon = item.querySelector('.platform-check-icon');
                            const platformIcon = item.querySelector('.platform-icon');
                            
                            checkbox.checked = false;
                            item.classList.remove('selected');
                            checkIcon.classList.add('hidden');
                            platformIcon.classList.remove('text-purple-400');
                        });
                    });
                }
            }
            
            initReleaseForm() {
                const form = document.getElementById('upload-form');
                if (!form) return;
                
                this.initFileDropzone('cover-dropzone', 'coverArt');
                this.initFileDropzone('audio-dropzone', 'audioFile');
                this.initPitchingToggle();
                this.initPlatformSelection();
                
                const coverInput = form.querySelector('input[name="coverArt"]');
                coverInput.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            document.getElementById('cover-preview').classList.remove('hidden');
                            document.getElementById('cover-preview').querySelector('img').src = event.target.result;
                            document.getElementById('cover-info').textContent = `${file.name} (${Utils.formatFileSize(file.size)})`;
                        };
                        reader.readAsDataURL(file);
                    }
                });
                
                const audioInput = form.querySelector('input[name="audioFile"]');
                audioInput.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        document.getElementById('audio-info').classList.remove('hidden');
                        document.getElementById('audio-name').textContent = `${file.name} (${Utils.formatFileSize(file.size)})`;
                    }
                });
                
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    const coverArtFile = form.querySelector('input[name="coverArt"]').files[0];
                    const audioFile = form.querySelector('input[name="audioFile"]').files[0];
                    
                    if (!coverArtFile || !audioFile) {
                        Utils.showNotification('Загрузите обложку и аудиофайл', 'warning');
                        return;
                    }

                    if (!audioFile.name.toLowerCase().endsWith('.wav')) {
                        Utils.showNotification('Аудиофайл должен быть в формате WAV', 'warning');
                        return;
                    }

                    const selectedPlatforms = Array.from(form.querySelectorAll('input[name="platforms"]:checked'))
                        .map(cb => cb.value);

                    if (selectedPlatforms.length === 0) {
                        Utils.showNotification('Выберите хотя бы одну музыкальную площадку', 'warning');
                        return;
                    }

                    const pitching = form.querySelector('#pitching-checkbox').checked;
                    const pitchingDescription = pitching ? form.querySelector('textarea[name="pitchingDescription"]').value : '';

                    if (pitching && !pitchingDescription.trim()) {
                        Utils.showNotification('Заполните описание для питчинга', 'warning');
                        return;
                    }
                    
                    try {
                        const coverArt = await Utils.fileToBase64(coverArtFile);
                        const audioFileData = await Utils.fileToBase64(audioFile);
                        
                        releaseService.createRelease({
                            title: form.title.value,
                            artist: form.artist.value,
                            genre: form.genre.value,
                            releaseDate: form.releaseDate.value,
                            coverArt,
                            audioFile: audioFileData,
                            platforms: selectedPlatforms,
                            pitching,
                            pitchingDescription
                        });
                        
                        Utils.showNotification('Релиз успешно отправлен на модерацию! 🎉');
                        form.reset();
                        document.getElementById('cover-preview').classList.add('hidden');
                        document.getElementById('audio-info').classList.add('hidden');
                        
                        document.querySelectorAll('.platform-item').forEach(item => {
                            item.classList.remove('selected');
                            item.querySelector('.platform-check-icon').classList.add('hidden');
                            item.querySelector('.platform-icon').classList.remove('text-purple-400');
                            item.querySelector('.platform-checkbox').checked = false;
                        });
                        
                        document.getElementById('pitching-description-container').classList.add('hidden');
                        document.getElementById('pitching-checkbox').checked = false;
                        
                        this.refreshReleasesTable();
                        
                    } catch (error) {
                        Utils.showNotification('Ошибка загрузки: ' + error.message, 'error');
                    }
                });
                
                document.getElementById('reset-form-btn')?.addEventListener('click', () => {
                    form.reset();
                    document.getElementById('cover-preview').classList.add('hidden');
                    document.getElementById('audio-info').classList.add('hidden');
                    document.getElementById('pitching-description-container').classList.add('hidden');
                    
                    document.querySelectorAll('.platform-item').forEach(item => {
                        item.classList.remove('selected');
                        item.querySelector('.platform-check-icon').classList.add('hidden');
                        item.querySelector('.platform-icon').classList.remove('text-purple-400');
                        item.querySelector('.platform-checkbox').checked = false;
                    });
                });
            }
            
            initFileDropzone(dropzoneId, inputName) {
                const dropzone = document.getElementById(dropzoneId);
                const input = dropzone.querySelector('input[type="file"]');
                
                dropzone.addEventListener('click', () => input.click());
                
                dropzone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    dropzone.classList.add('active');
                });
                
                dropzone.addEventListener('dragleave', () => {
                    dropzone.classList.remove('active');
                });
                
                dropzone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    dropzone.classList.remove('active');
                    input.files = e.dataTransfer.files;
                    input.dispatchEvent(new Event('change'));
                });
            }
            
            initReleaseDetails() {
                document.addEventListener('click', (e) => {
                    const detailsBtn = e.target.closest('.view-details-btn');
                    if (detailsBtn) {
                        const releaseId = detailsBtn.dataset.releaseId;
                        const releases = authService.isAdmin() ? 
                            releaseService.getAllReleases() : 
                            releaseService.getUserReleases();
                        const release = releases.find(r => r.id === releaseId);
                        if (release) this.showReleaseDetails(release);
                    }
                });
            }

                                </div>
                                <div class="bg-white/5 rounded-xl p-4">
                                    <p class="text-sm text-gray-400 mb-1">Жанр</p>
                                    <p class="font-semibold">${Utils.escapeHtml(release.genre)}</p>
                                </div>
                                <div class="bg-white/5 rounded-xl p-4">

                                    <p class="font-semibold">${release.releaseDate}</p>
                                </div>
                                <div class="bg-white/5 rounded-xl p-4">

                                    ${release.pitching && release.pitchingDescription ? `

                                            <p class="text-sm text-gray-300">${Utils.escapeHtml(release.pitchingDescription)}</p>
                                        </div>

                                ${release.upcCode ? `

                                        <p class="text-sm text-gray-400 mb-1">UPC</p>

                                ` : ''}
                                ${release.rejectionReason ? `

                                ` : ''}
                                <div class="bg-white/5 rounded-xl p-4">
                                    <p class="text-sm text-gray-400 mb-1">Статус</p>
                                    ${Utils.getStatusBadge(release.status)}

                                ${release.coverArt ? `
                                    <img src="${release.coverArt}" class="w-full rounded-xl ring-2 ring-gray-700">

                document.body.appendChild(modal);

            refreshReleasesTable() {
                const container = document.getElementById('releases-table-container');
                if (container) {
                    container.innerHTML = UIComponents.createReleasesTable(releaseService.getUserReleases());
                }
