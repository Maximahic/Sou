            initAdmin() {
                // Обработчики статусов релизов
                document.addEventListener('change', (e) => {
                    if (e.target.classList.contains('status-select')) {
                        const releaseId = e.target.dataset.releaseId;
                        const rejectionInput = document.querySelector(`.rejection-reason-input[data-release-id="${releaseId}"]`);
                        if (rejectionInput) {
                            rejectionInput.style.display = e.target.value === 'rejected' ? 'block' : 'none';
                        }
                    }
                });

                document.addEventListener('click', async (e) => {
                    const saveBtn = e.target.closest('.save-status-btn');
                    if (saveBtn) {
                        const releaseId = saveBtn.dataset.releaseId;
                        const row = saveBtn.closest('tr');
                        const statusSelect = row.querySelector('.status-select');
                        const isrcInput = row.querySelector('input[data-field="isrcCode"]');
                        const upcInput = row.querySelector('input[data-field="upcCode"]');
                        const rejectionInput = row.querySelector('.rejection-reason-input input');
                        
                        const status = statusSelect.value;
                        const rejectionReason = status === 'rejected' && rejectionInput ? rejectionInput.value : '';
                        
                        if (status === 'rejected' && !rejectionReason) {
                            Utils.showNotification('Укажите причину отклонения', 'warning');
                            return;
                        }
                        
                        try {
                            releaseService.updateStatus(
                                releaseId, status,
                                isrcInput?.value || '',
                                upcInput?.value || '',
                                rejectionReason
                            );
                            Utils.showNotification('Статус релиза обновлен! ✅');
                            this.refreshAdminTable();
                        } catch (error) {
                            Utils.showNotification('Ошибка: ' + error.message, 'error');
                        }
                    }
                    
                    const deleteBtn = e.target.closest('.delete-release-btn');
                    if (deleteBtn) {
                        const releaseId = deleteBtn.dataset.releaseId;
                        const confirmed = await Utils.confirmDialog('Вы уверены, что хотите удалить этот релиз?');
                        if (confirmed) {
                            try {
                                releaseService.deleteRelease(releaseId);
                                Utils.showNotification('Релиз удален! 🗑️');
                                this.refreshAdminTable();
                            } catch (error) {
                                Utils.showNotification('Ошибка: ' + error.message, 'error');
                            }
                        }
                    }
                    
                    const promoteBtn = e.target.closest('.promote-btn');
                    if (promoteBtn) {
                        const userId = promoteBtn.dataset.userId;
                        try {
                            await authService.promoteToAdmin(userId);
                            Utils.showNotification('Пользователь повышен до администратора! 👑');
                            this.loadAdminUsers();
                        } catch (error) {
                            Utils.showNotification('Ошибка: ' + error.message, 'error');
                        }
                    }

                    const demoteBtn = e.target.closest('.demote-btn');
                    if (demoteBtn) {
                        const userId = demoteBtn.dataset.userId;
                        try {
                            await authService.demoteToUser(userId);
                            Utils.showNotification('Права администратора отозваны! 👤');
                            this.loadAdminUsers();
                        } catch (error) {
                            Utils.showNotification('Ошибка: ' + error.message, 'error');
                        }
                    }

                    const deleteUserBtn = e.target.closest('.delete-user-btn');
                    if (deleteUserBtn) {
                        const userId = deleteUserBtn.dataset.userId;
                        const confirmed = await Utils.confirmDialog('Вы уверены, что хотите удалить этого пользователя?');
                        if (confirmed) {
                            try {
                                await authService.deleteUser(userId);
                                Utils.showNotification('Пользователь удален! 🗑️');
                                this.loadAdminUsers();
                            } catch (error) {
                                Utils.showNotification('Ошибка: ' + error.message, 'error');
                            }
                        }
                    }
                });

                // Обработчики кнопок очистки кэша
                const clearContentBtn = document.getElementById('clear-content-btn');
                const clearAllBtn = document.getElementById('clear-all-btn');
                const clearSessionBtn = document.getElementById('clear-session-btn');

                if (clearContentBtn) {
                    clearContentBtn.addEventListener('click', async () => {
                        const confirmed = await Utils.confirmDialog(
                            'Вы уверены, что хотите удалить ВСЕ релизы и тикеты? Пользователи останутся, но весь контент будет потерян.',
                            true
                        );
                        if (confirmed) {
                            const count = db.clearContentData();
                            Utils.showNotification(`Очищено ${count} записей контента! 🧹`);
                            // Пересоздаем пустые коллекции
                            db.set('releases', []);
                            db.set('tickets', []);
                            db.set('ticket_messages', []);
                            // Обновляем страницу
                            setTimeout(() => {
                                this.navigate('admin');
                            }, 500);
                        }
                    });
                }

                if (clearAllBtn) {
                    clearAllBtn.addEventListener('click', async () => {
                        const confirmed = await Utils.confirmDialog(
                            'ВНИМАНИЕ! Это удалит ВСЕ данные сайта: пользователей, релизы, тикеты. После этого все пользователи должны будут зарегистрироваться заново. Администратор будет создан автоматически.',
                            true
                        );
                        if (confirmed) {
                            const count = db.clearAllData();
                            Utils.showNotification(`Полная очистка выполнена! Удалено ${count} записей. Сайт будет перезагружен. 🔄`, 'warning');
                            // Перезагружаем страницу
                            setTimeout(() => {
                                location.reload();
                            }, 1500);
                        }
                    });
                }

                if (clearSessionBtn) {
                    clearSessionBtn.addEventListener('click', async () => {
                        const confirmed = await Utils.confirmDialog(
                            'Это выйдет из всех аккаунтов. Вы тоже выйдете. Продолжить?'
                        );
                        if (confirmed) {
                            db.clearSessionData();
                            Utils.showNotification('Все сессии сброшены! Вы будете перенаправлены на страницу входа. 👋', 'info');
                            setTimeout(() => {
                                location.reload();
                            }, 1000);
                        }
                    });
                }

                // Обновление админ-таблицы
                const refreshBtn = document.getElementById('refresh-admin-releases-btn');
                if (refreshBtn) {
                    refreshBtn.addEventListener('click', () => {
                        this.refreshAdminTable();
                        Utils.showNotification('Таблица обновлена', 'info');
                    });
                }
                
                this.loadAdminTickets();
                this.loadAdminUsers();
            }
            
            loadAdminUsers() {
                const container = document.getElementById('admin-users-table');
                if (!container) return;
                
                const users = db.get('users');
                const currentUserId = authService.currentUser?.id;
                
                container.innerHTML = `
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr class="border-b border-gray-700">
                                    <th class="text-left p-3 text-xs font-semibold text-gray-400 uppercase">Пользователь</th>
                                    <th class="text-left p-3 text-xs font-semibold text-gray-400 uppercase">Email</th>
                                    <th class="text-left p-3 text-xs font-semibold text-gray-400 uppercase">Роль</th>
                                    <th class="text-left p-3 text-xs font-semibold text-gray-400 uppercase">Релизов</th>
                                    <th class="text-left p-3 text-xs font-semibold text-gray-400 uppercase">Дата регистрации</th>
                                    <th class="text-left p-3 text-xs font-semibold text-gray-400 uppercase">Действия</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-700/50">
                                ${users.map(user => {
                                    const userReleases = db.query('releases', { userId: user.id });
                                    const releaseCount = userReleases.length;
                                    const isCurrentUser = user.id === currentUserId;
                                    
                                    return `
                                        <tr class="transition-colors ${user.isHidden ? 'opacity-60' : ''}">
                                            <td class="p-3">
                                                <div class="flex items-center gap-3">
                                                    <div class="w-8 h-8 bg-gradient-to-br ${user.role === 'admin' ? 'from-purple-500 to-violet-500' : 'from-blue-500 to-cyan-500'} rounded-full flex items-center justify-center text-white font-bold text-sm">
                                                        ${user.fullName.charAt(0).toUpperCase()}
                                                    </div>
                                                    <div>
                                                        <span class="font-semibold text-sm">${Utils.escapeHtml(user.fullName)}</span>
                                                        ${user.isHidden ? '<span class="text-xs text-gray-500 block">Системный</span>' : ''}
                                                    </div>
                                                </div>
                                            </td>
                                            <td class="p-3 text-sm text-gray-400">${Utils.escapeHtml(user.email)}</td>
                                            <td class="p-3">
                                                <span class="status-badge ${user.role === 'admin' ? 'bg-purple-500/10 text-purple-400 border border-purple-500/20' : 'bg-blue-500/10 text-blue-400 border border-blue-500/20'}">
                                                    ${user.role === 'admin' ? '👑 Админ' : '🎵 Артист'}
                                                </span>
                                            </td>
                                            <td class="p-3 text-sm text-gray-400">${releaseCount}</td>
                                            <td class="p-3 text-sm text-gray-400">${Utils.formatDate(user.createdAt)}</td>
                                            <td class="p-3">
                                                <div class="flex gap-2">
                                                    ${!user.isHidden && !isCurrentUser ? `
                                                        ${user.role !== 'admin' ? `
                                                            <button class="promote-btn btn-secondary text-xs px-3 py-1.5 rounded-lg" data-user-id="${user.id}">
                                                                <i class="fas fa-arrow-up mr-1"></i>Повысить
                                                            </button>
                                                        ` : `
                                                            <button class="demote-btn btn-secondary text-xs px-3 py-1.5 rounded-lg" data-user-id="${user.id}">
                                                                <i class="fas fa-arrow-down mr-1"></i>Понизить
                                                            </button>
                                                        `}
                                                        <button class="delete-user-btn btn-danger text-xs px-3 py-1.5 rounded-lg" data-user-id="${user.id}">
                                                            <i class="fas fa-trash"></i>
                                                        </button>
                                                    ` : ''}
                                                </div>
                                            </td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            }
            
            refreshAdminTable() {
                const container = document.getElementById('admin-releases-table');
                if (container) {
                    container.innerHTML = UIComponents.createReleasesTable(releaseService.getAllReleases(), true);
                    document.querySelectorAll('.status-select').forEach(select => {
                        const releaseId = select.dataset.releaseId;
                        const rejectionInput = document.querySelector(`.rejection-reason-input[data-release-id="${releaseId}"]`);
                        if (rejectionInput) {
                            rejectionInput.style.display = select.value === 'rejected' ? 'block' : 'none';
                        }
                    });
                }
            }
            
            loadAdminTickets() {
                const container = document.getElementById('admin-tickets-container');
                if (!container) return;
                
                const tickets = supportService.getAllTickets();
                
                container.innerHTML = tickets.map(ticket => `
                    <div class="border border-gray-700 rounded-xl p-4 mb-3 hover:bg-white/5 cursor-pointer transition-all">
                        <div class="flex justify-between items-start">
                            <div onclick="router.openChat('${ticket.id}')" class="flex-1">
                                <p class="font-semibold">${Utils.escapeHtml(ticket.subject)}</p>
                                <p class="text-sm text-gray-400">От: ${Utils.escapeHtml(ticket.userEmail)}</p>
                                <p class="text-xs text-gray-500 mt-1">${Utils.formatDate(ticket.createdAt)}</p>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="status-badge ${ticket.status === 'open' ? 'bg-yellow-500/10 text-yellow-400 border border-yellow-500/20' : ticket.status === 'in_progress' ? 'bg-blue-500/10 text-blue-400 border border-blue-500/20' : 'bg-green-500/10 text-green-400 border border-green-500/20'}">
                                    ${ticket.status === 'open' ? 'Открыт' : ticket.status === 'in_progress' ? 'В работе' : 'Закрыт'}
                                </span>
                                ${ticket.status !== 'closed' ? `
                                    <button class="close-ticket-btn text-xs text-green-400 hover:text-green-300 px-2 py-1 rounded-lg hover:bg-green-500/10 transition-colors" data-ticket-id="${ticket.id}">
                                        <i class="fas fa-check"></i>
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `).join('') || '<p class="text-gray-500 text-center py-8">Нет активных обращений</p>';

                container.querySelectorAll('.close-ticket-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        const ticketId = btn.dataset.ticketId;
                        try {
                            supportService.updateTicketStatus(ticketId, 'closed');
                            Utils.showNotification('Тикет закрыт! ✅');
                            this.loadAdminTickets();
                        } catch (error) {
                            Utils.showNotification('Ошибка: ' + error.message, 'error');
                        }
                    });
                });
            }
            
            initSupport() {
                const ticketForm = document.getElementById('ticket-form');
                ticketForm?.addEventListener('submit', (e) => {
                    e.preventDefault();
                    supportService.createTicket(ticketForm.subject.value, ticketForm.message.value);
                    Utils.showNotification('Обращение успешно создано! 📩');
                    ticketForm.reset();
                    this.refreshTicketsList();
                });
                
                this.refreshTicketsList();
            }
            
            refreshTicketsList() {
                const container = document.getElementById('tickets-list');
                if (!container) return;
                
                const tickets = authService.isAdmin() ? 
                    supportService.getAllTickets() : 
                    supportService.getUserTickets();
                
                container.innerHTML = tickets.map(ticket => `
                    <div class="border border-gray-700 rounded-xl p-4 mb-3 hover:bg-white/5 cursor-pointer transition-all" onclick="router.openChat('${ticket.id}')">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="font-semibold">${Utils.escapeHtml(ticket.subject)}</p>
                                <p class="text-xs text-gray-500 mt-1">
                                    ${Utils.formatDate(ticket.createdAt)} · ${ticket.messageCount} сообщ.
                                </p>
                            </div>
                            <span class="status-badge ${ticket.status === 'open' ? 'bg-yellow-500/10 text-yellow-400 border border-yellow-500/20' : ticket.status === 'in_progress' ? 'bg-blue-500/10 text-blue-400 border border-blue-500/20' : 'bg-green-500/10 text-green-400 border border-green-500/20'}">
                                ${ticket.status === 'open' ? 'Открыт' : ticket.status === 'in_progress' ? 'В работе' : 'Закрыт'}
                            </span>
                        </div>
                    </div>
                `).join('') || '<p class="text-gray-500 text-center py-8">У вас пока нет обращений</p>';
            }
            
            openChat(ticketId) {
                const modal = document.getElementById('chat-modal');
                const messagesContainer = document.getElementById('chat-messages');
                
                modal.classList.remove('hidden');
                
                const loadMessages = () => {
                    const messages = supportService.getMessages(ticketId);
                    messagesContainer.innerHTML = messages.map(msg => `
                        <div class="flex ${msg.senderId === authService.currentUser.id ? 'justify-end' : 'justify-start'}">
                            <div class="max-w-xs lg:max-w-md px-4 py-3 rounded-xl ${
                                msg.senderId === authService.currentUser.id ? 
                                    'bg-gradient-to-r from-purple-600 to-blue-600 text-white' : 
                                    'bg-white/5 text-gray-200 border border-gray-700'
                            }">
                                <p class="text-xs font-semibold mb-1 opacity-75">${Utils.escapeHtml(msg.senderName)} <span class="text-[10px]">(${msg.senderRole === 'admin' ? 'Админ' : 'Артист'})</span></p>
                                <p class="text-sm">${Utils.escapeHtml(msg.message)}</p>
                                <p class="text-xs mt-2 opacity-50">${Utils.formatDate(msg.createdAt)}</p>
                            </div>
                        </div>
                    `).join('');
                    
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                };
                
                loadMessages();
                
                const chatForm = document.getElementById('chat-form');
                chatForm.onsubmit = (e) => {
                    e.preventDefault();
                    const message = chatForm.message.value;
                    supportService.sendMessage(ticketId, message);
                    chatForm.reset();
                    loadMessages();
                };
            }
        }
        
        // ============================================
        // ГЛАВНОЕ ПРИЛОЖЕНИЕ
        // ============================================
        class App {
            constructor() {
                this.router = new Router();
                this.init();
            }
            
            async init() {
                if (authService.isAuthenticated()) {
                    this.showMainApp();
                } else {
                    this.showAuthPage();
                }
            }
            
            showAuthPage() {
                const app = document.getElementById('app');
                app.innerHTML = `
                    <div class="auth-screen min-h-screen flex items-center justify-center p-4 sm:p-6 relative">
                        <div class="auth-orb auth-orb-left absolute top-20 left-20 w-64 h-64 bg-purple-500/20 rounded-full filter blur-3xl"></div>
                        <div class="auth-orb auth-orb-right absolute bottom-20 right-20 w-64 h-64 bg-blue-500/20 rounded-full filter blur-3xl"></div>
                        
                        <div class="auth-card-shell w-full max-w-md relative z-10">
                            <div class="auth-heading text-center mb-6 sm:mb-8">
                                <div class="relative inline-block mb-4 sm:mb-6">
                                    <i class="fas fa-water text-5xl sm:text-6xl pulse-glow" style="color: var(--accent);"></i>
                                    <div class="absolute inset-0 bg-gradient-to-r from-purple-500 to-blue-500 rounded-full filter blur-xl opacity-20 animate-pulse"></div>
                                </div>
                                <h1 class="text-3xl sm:text-4xl font-black gradient-text mb-2 sm:mb-3">Subtle Currents</h1>
                                <p class="text-gray-400 text-base sm:text-lg">Вход для артистов с любого устройства</p>
                            </div>
                            
                            <div class="card auth-card p-5 sm:p-8" id="auth-container"></div>
                        </div>
                    </div>
                `;
                
                this.showLoginForm();
            }
            
            showLoginForm() {
                const container = document.getElementById('auth-container');
                container.innerHTML = `
                    <div class="mb-6">
                        <h2 class="text-2xl font-bold">Вход в аккаунт</h2>
                        <p class="text-sm text-gray-400 mt-2">Поля заполнять обязательно</p>
                    </div>
                    <form id="login-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-2">Email</label>
                            <input type="email" name="email" required autocomplete="email" inputmode="email" class="input-dark mobile-input w-full px-4 py-4 sm:py-3 rounded-xl text-base sm:text-sm" placeholder="your@email.com">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">Пароль</label>
                            <input type="password" name="password" required autocomplete="current-password" class="input-dark mobile-input w-full px-4 py-4 sm:py-3 rounded-xl text-base sm:text-sm" placeholder="••••••••">
                        </div>
                        <div id="login-error" class="text-red-400 text-sm hidden bg-red-500/10 px-4 py-2 rounded-xl"></div>
                        <button type="submit" class="btn-primary mobile-submit w-full py-4 sm:py-3 rounded-xl text-base sm:text-sm font-semibold">
                            Войти в аккаунт
                        </button>
                    </form>
                    <p class="text-center mt-6 text-sm text-gray-400">
                        Нет аккаунта? 
                        <button id="show-register-btn" class="text-purple-400 hover:text-purple-300 font-semibold transition-colors">Зарегистрироваться</button>
                    </p>
                `;
                
                document.getElementById('login-form').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email = e.target.email.value;
                    const password = e.target.password.value;
                    
                    try {
                        await authService.login(email, password);
                        this.showMainApp();
                    } catch (error) {
                        const errorDiv = document.getElementById('login-error');
                        errorDiv.textContent = error.message;
                        errorDiv.classList.remove('hidden');
                    }
                });
                
                document.getElementById('show-register-btn').addEventListener('click', () => this.showRegisterForm());
            }
            
            showRegisterForm() {
                const container = document.getElementById('auth-container');
                container.innerHTML = `
                    <div class="mb-6">
                        <h2 class="text-2xl font-bold">Регистрация</h2>
                        <p class="text-sm text-gray-400 mt-2">Создайте аккаунт для доступа к платформе</p>
                    </div>
                    <form id="register-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-2">Полное имя</label>
                            <input type="text" name="fullName" required autocomplete="name" class="input-dark mobile-input w-full px-4 py-4 sm:py-3 rounded-xl text-base sm:text-sm" placeholder="Иван Иванов">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">Email</label>
                            <input type="email" name="email" required autocomplete="email" inputmode="email" class="input-dark mobile-input w-full px-4 py-4 sm:py-3 rounded-xl text-base sm:text-sm" placeholder="your@email.com">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">Пароль (минимум 6 символов)</label>
                            <input type="password" name="password" required minlength="6" autocomplete="new-password" class="input-dark mobile-input w-full px-4 py-4 sm:py-3 rounded-xl text-base sm:text-sm" placeholder="••••••••">
                        </div>
                        <div id="register-error" class="text-red-400 text-sm hidden bg-red-500/10 px-4 py-2 rounded-xl"></div>
                        <button type="submit" class="btn-primary mobile-submit w-full py-4 sm:py-3 rounded-xl text-base sm:text-sm font-semibold">
                            Зарегистрироваться
                        </button>
                    </form>
                    <p class="text-center mt-6 text-sm text-gray-400">
                        Уже есть аккаунт? 
                        <button id="show-login-btn" class="text-purple-400 hover:text-purple-300 font-semibold transition-colors">Войти</button>
                    </p>
                `;
                
                document.getElementById('register-form').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    try {
                        await authService.register(
                            e.target.email.value,
                            e.target.password.value,
                            e.target.fullName.value
                        );
                        this.showMainApp();
                    } catch (error) {
                        const errorDiv = document.getElementById('register-error');
                        errorDiv.textContent = error.message;
                        errorDiv.classList.remove('hidden');
                    }
                });
                
                document.getElementById('show-login-btn').addEventListener('click', () => this.showLoginForm());
            }
            
            showMainApp() {
                const user = authService.currentUser;
                const app = document.getElementById('app');
                
                app.innerHTML = `
                    ${UIComponents.createNavbar(user)}
                    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 py-6 sm:py-8">
                        <div id="page-content"></div>
                    </main>
                `;
                
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        this.router.navigate(btn.dataset.page);
                    });
                });
                
                document.getElementById('logout-btn').addEventListener('click', async () => {
                    await authService.logout();
                    Utils.showNotification('Вы вышли из аккаунта', 'info');
                    this.showAuthPage();
                });
                
                this.router.navigate('dashboard');
            }
        }
        
        // ============================================
        // ЗАПУСК ПРИЛОЖЕНИЯ
        // ============================================
        const app = new App();
        
        window.router = app.router;
        window.authService = authService;
        window.releaseService = releaseService;
        window.supportService = supportService;
        window.cacheService = db.cacheService;

        // Удаляем экран загрузки
        setTimeout(() => {
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
                loadingScreen.style.opacity = '0';
                loadingScreen.style.transition = 'opacity 0.5s';
                setTimeout(() => loadingScreen.remove(), 500);
            }
        }, 1000);
    </script>
</body>
</html>
